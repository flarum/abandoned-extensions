name: Validate

on:
  pull_request:
    paths:
      - abandoned.json

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate JSON syntax
        run: |
          if ! python3 -m json.tool abandoned.json > /dev/null; then
            echo "::error file=abandoned.json::abandoned.json contains invalid JSON — please fix manually."
            exit 1
          fi
          echo "JSON syntax is valid."

      - name: Auto-fix formatting and structure
        id: autofix
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("abandoned.json") as f:
              data = json.load(f)

          errors = []

          for key, value in data.items():
              if "/" not in key:
                  errors.append(f"Key '{key}' does not look like a composer package name (expected vendor/package).")
              if not isinstance(value, dict):
                  errors.append(f"Value for '{key}' must be an object, got: {type(value).__name__}.")
              else:
                  if "replacement" in value and not isinstance(value["replacement"], str):
                      errors.append(f"'replacement' for '{key}' must be a string.")
                  for extra_key in value:
                      if extra_key != "replacement":
                          errors.append(f"Unknown field '{extra_key}' in entry for '{key}'. Only 'replacement' is allowed.")

          if errors:
              for error in errors:
                  print(f"::error file=abandoned.json::{error}")
              sys.exit(1)

          # Sort keys alphabetically and rewrite
          sorted_data = dict(sorted(data.items()))
          with open("abandoned.json", "w") as f:
              json.dump(sorted_data, f, indent=2)
              f.write("\n")

          if list(data.keys()) != list(sorted_data.keys()):
              print("Keys were not sorted alphabetically — fixed.")
          else:
              print("Formatting and structure look good.")
          EOF

      - name: Commit fixes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet abandoned.json; then
            git add abandoned.json
            git commit -m "chore: auto-sort abandoned.json"
            git push
          else
            echo "No changes needed."
          fi

      - name: Check packages exist on Packagist (warning only)
        run: |
          python3 - <<'EOF'
          import json, urllib.request, urllib.error

          with open("abandoned.json") as f:
              data = json.load(f)

          warnings = []

          for package in data.keys():
              url = f"https://packagist.org/packages/{package}.json"
              try:
                  urllib.request.urlopen(url, timeout=10)
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      warnings.append(f"Package '{package}' was not found on Packagist. If this is a private package, this warning can be ignored.")
                  else:
                      warnings.append(f"Could not check '{package}' on Packagist (HTTP {e.code}).")
              except Exception as e:
                  warnings.append(f"Could not check '{package}' on Packagist: {e}")

          for warning in warnings:
              print(f"::warning file=abandoned.json::{warning}")

          if warnings:
              print("\nSome packages could not be verified on Packagist — please review manually.")
          else:
              print("All packages found on Packagist.")
          EOF
